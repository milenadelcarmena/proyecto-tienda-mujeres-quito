{% extends "base.html" %}
{% block title %}Actualizar{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-8">
        <div class="card shadow border-warning">
            <div class="card-header bg-warning text-dark text-center py-4">
                <h2><i class="fas fa-edit me-2"></i>✏️ Actualizar Producto</h2>
            </div>
            <div class="card-body">
                {% if not id_producto %}
                <!-- SELECCIONAR -->
                <form method="GET" action="/editar">
                    <div class="mb-4">
                        <label class="form-label fs-5">📦 Seleccionar producto:</label>
                        <select name="id_producto" class="form-select form-select-lg" onchange="this.form.submit()" required>
                            <option value="">-- Elige producto --</option>
                            {% for p in productos %}
                            <option value="{{ p.id_producto }}">ID {{ p.id_producto }}: {{ p.nombre }} ({{ p.cantidad }} x ${{ "%.2f"|format(p.precio) }})</option>
                            {% endfor %}
                        </select>
                    </div>
                </form>
                {% else %}
                <!-- FORMULARIO EDITAR -->
                <form method="POST">
                    <input type="hidden" name="id_producto" value="{{ id_producto }}">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label">🆔 ID:</label>
                            <input type="number" class="form-control" value="{{ id_producto }}" readonly>
                        </div>
                        <div class="col-md-8">
                            <label class="form-label fs-5">📝 Nombre:</label>
                            <input type="text" name="nombre" class="form-control form-control-lg" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fs-5">📊 Cantidad:</label>
                            <input type="number" name="cantidad" class="form-control form-control-lg" min="0" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fs-5">💰 Precio:</label>
                            <input type="number" step="0.01" name="precio" class="form-control form-control-lg" min="0" required>
                        </div>
                    </div>
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-warning btn-lg">
                            <i class="fas fa-save me-2"></i>💾 Actualizar Producto
                        </button>
                        <a href="/" class="btn btn-secondary btn-lg">🏠 Cancelar</a>
                    </div>
                </form>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
