<!DOCTYPE html>
<html>
<head>
    <title>🏪 Tienda Mujeres Quito</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .hero { background: linear-gradient(135deg, #ff9a9e, #fecfef); padding: 3rem 0; }
        .card-producto { transition: transform 0.3s; }
        .card-producto:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="hero">
        <div class="container">
            <h1 class="display-4 text-center fw-bold text-dark mb-4">🏪 TIENDA MUJERES QUITO</h1>
            <p class="lead text-center">SEM 14 ✅ {{ total }} Productos Disponibles</p>
        </div>
    </div>

    <div class="container my-5">
        <div class="row">
            {% for producto in productos %}
            <div class="col-md-3 mb-4">
                <div class="card card-producto shadow-sm h-100">
                    <div class="card-body text-center">
                        <h5 class="card-title fw-bold">{{ producto.nombre }}</h5>
                        <p class="text-success fs-4 fw-bold">${{ "%.2f"|format(producto.precio) }}</p>
                        <p class="badge bg-primary fs-6">Stock: {{ producto.cantidad }}</p>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
        <div class="text-center mt-5">
            <a href="/mysql_test" class="btn btn-success btn-lg">🔍 Probar MySQL</a>
        </div>
    </div>
</body>
</html>
